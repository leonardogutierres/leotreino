<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>LeoTreino</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <!-- PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Meus Treinos" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="/icon-192x192.png" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/favicon.ico" />
  <!-- Prevent zoom on input focus iOS -->
  <meta name="format-detection" content="telephone=no" />
  <style>
    :root {
      --bg-color: #1a1a1a;
      --container-bg: #222222;
      --card-bg: rgba(50, 50, 55, 0.85);
      --text-color: #f0f0f0;
      --primary-color: #4facfe;
      --secondary-color: #00f2fe;
      --accent-color: rgba(79, 172, 254, 0.15);
      --active-color: #4facfe;
      --exercicio-bg: rgba(45, 58, 80, 0.75);
      --serie-bg: rgba(38, 50, 68, 0.7);
      --input-bg: #2e2e2e;
      --border-color: rgba(255, 255, 255, 0.18);
      --timer-color: #ff4d4d;
      --timer-bg: rgba(0, 0, 0, .3);
      --btn-bg: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      --btn-text: #fff;
      --success-color: #00e676;
      --warning-color: #ffd600;
      --nav-bg: rgba(40, 40, 45, 0.9);
      --nav-item-color: #aaa;
      --nav-item-active-color: #fff;
      --glass-bg: rgba(35, 35, 40, 0.85);
      --glass-border: rgba(255, 255, 255, 0.14);
    }

    .light-mode {
      --bg-color: #f8f9fa;
      --container-bg: #ffffff;
      --card-bg: rgba(255, 255, 255, 0.8);
      --text-color: #1a1a1a;
      --primary-color: #007bff;
      --secondary-color: #00d2ff;
      --accent-color: rgba(0, 123, 255, 0.05);
      --active-color: #007bff;
      --exercicio-bg: rgba(240, 245, 255, 0.6);
      --serie-bg: rgba(245, 249, 255, 0.5);
      --input-bg: #ffffff;
      --border-color: rgba(0, 0, 0, 0.08);
      --timer-color: #dc3545;
      --timer-bg: rgba(0, 0, 0, 0.05);
      --btn-bg: linear-gradient(135deg, #007bff 0%, #00d2ff 100%);
      --btn-text: #fff;
      --nav-bg: rgba(255, 255, 255, 0.9);
      --nav-item-color: #6c757d;
      --nav-item-active-color: #007bff;
      --glass-bg: rgba(255, 255, 255, 0.8);
      --glass-border: rgba(0, 0, 0, 0.05);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      transition: background .3s, color .3s;
      -webkit-font-smoothing: antialiased;
      max-width: 100vw;
      overflow-x: hidden;
      overscroll-behavior-y: none;
    }

    .container {
      max-width: 600px; margin: 0 auto; padding: 16px;
      padding-top: 50px;
      padding-bottom: calc(env(safe-area-inset-bottom) + 80px);
      background: var(--container-bg); min-height: 100vh; transition: background .3s;
    }

    .header {
      position: sticky; top: 0; z-index: 500;
      background: var(--glass-bg);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--glass-border);
      padding: 10px 16px;
      display: flex; flex-direction: column; gap: 12px;
      margin: 0 -16px 20px -16px;
    }

    .header-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }

    h1 {
      margin: 0; color: var(--primary-color);
      font-weight: 800; font-size: clamp(0.75rem, 3.2vw, 1.1rem); letter-spacing: .3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .header-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    /* === DASHBOARD HEADER === */
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto;
      gap: 8px;
      margin-bottom: 10px;
    }

    /* Timer: ocupa a coluna da esquerda, 2 linhas */
    .timer-card {
      grid-row: 1 / 3;
      background: var(--card-bg);
      backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 12px 8px; gap: 4px;
      position: relative; overflow: hidden;
    }
    .timer-card::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 120%, rgba(79,172,254,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .timer-card-label {
      font-size: 0.6em; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--nav-item-color); margin-bottom: 2px;
    }
    .workout-timer-header {
      font-family: 'SF Mono', 'Courier New', monospace;
      font-size: 1.55em; font-weight: 900; letter-spacing: 2px;
      color: var(--secondary-color);
      text-shadow: 0 0 12px rgba(0, 242, 254, 0.35);
      line-height: 1;
    }
    .timer-card-rest {
      display: flex; align-items: center; gap: 5px;
      margin-top: 6px; padding: 4px 8px;
      background: rgba(255,255,255,0.04); border-radius: 8px;
      border: 1px solid var(--border-color);
    }
    .timer-card-rest-label {
      font-size: 0.62em; color: var(--nav-item-color); white-space: nowrap;
    }
    .timer-config-input {
      width: 40px; padding: 2px 4px; border-radius: 5px;
      border: 1px solid var(--border-color); background: var(--input-bg);
      color: var(--text-color); text-align: center; font-size: 13px; font-weight: 700;
    }
    .timer-card-rest-unit {
      font-size: 0.62em; color: var(--nav-item-color);
    }

    /* Stats grid: 2x2 na coluna direita */
    .stats-container {
      grid-column: 2;
      display: grid; grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 8px;
    }
    .stat-card {
      background: var(--card-bg); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
      padding: 8px 4px; border-radius: 12px; text-align: center; transition: all .3s;
      border: 1px solid var(--border-color);
    }
    .stat-card:active { transform: scale(.98); }
    .stat-value { display: block; font-size: 1em; font-weight: 800; color: var(--primary-color); }
    .stat-label { display: block; font-size: .6em; font-weight: 600; color: var(--nav-item-color); margin-top: 3px; text-transform: uppercase; }

    .tabs {
      display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch;
      scrollbar-width: none; -ms-overflow-style: none;
      background: var(--nav-bg); border-radius: 10px; padding: 5px; gap: 5px; margin-bottom: 20px;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab-button {
      flex-shrink: 0; padding: 10px 15px; border: 0; background: transparent;
      color: var(--nav-item-color); font-size: 1em; font-weight: 600; cursor: pointer;
      border-radius: 8px; transition: background .3s, color .3s; touch-action: manipulation;
    }
    .tab-button.active { background: var(--active-color); color: var(--nav-item-active-color); font-weight: 800; }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .exercicio {
      background: var(--exercicio-bg); border-radius: 12px; padding: 15px; margin-bottom: 15px;
      border: 1px solid var(--border-color); box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }

    .ex-nome { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 10px; }
    .ex-nome-text { font-size: 1.2em; font-weight: 900; color: var(--primary-color); }
    .ex-actions { display: flex; gap: 8px; }

    .video-button, .theme-toggle-button, .reset-button, .nav-link-button {
      background: var(--accent-color); color: var(--primary-color); border: 0; border-radius: 50%;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      font-size: 1.15em; cursor: pointer; box-shadow: 0 2px 4px rgba(0,0,0,.2);
      transition: transform .2s, background .3s;
      user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; touch-action: manipulation;
    }
    .nav-link-button { text-decoration: none; }
    .video-button:active, .theme-toggle-button:active, .reset-button:active, .nav-link-button:active { transform: scale(.95); }

    .observacao {
      background: var(--serie-bg); padding: 8px 12px; border-radius: 8px;
      margin: 10px 0 15px; border-left: 4px solid var(--secondary-color); font-size: .9em;
    }

    .progresso-exercicio {
      font-size: .9em; color: var(--nav-item-color); margin: 5px 0 10px;
      padding: 5px 10px; background: var(--serie-bg); border-radius: 8px; text-align: center;
    }
    .progresso-exercicio.concluido { background: var(--secondary-color); color: var(--btn-text); font-weight: 900; }

    .serie { display: flex; flex-direction: column; gap: 10px; }
    .serie-item {
      display: flex; align-items: center; gap: 10px;
      background: var(--serie-bg); padding: 10px 15px; border-radius: 10px; border: 1px solid var(--border-color);
    }

    .checkbox-container {
      position: relative; padding-left: 35px; cursor: pointer;
      user-select: none; -webkit-user-select: none; flex-shrink: 0; touch-action: manipulation;
    }
    .checkbox-container input { position: absolute; opacity: 0; height: 0; width: 0; }
    .checkmark {
      position: absolute; top: 0; left: 0; width: 24px; height: 24px;
      background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 5px;
    }
    .checkbox-container input:checked ~ .checkmark { background: var(--primary-color); border-color: var(--primary-color); }
    .checkmark:after { content: ""; position: absolute; display: none; }
    .checkbox-container input:checked ~ .checkmark:after { display: block; }
    .checkbox-container .checkmark:after {
      left: 8px; top: 4px; width: 6px; height: 12px;
      border: solid #fff; border-width: 0 3px 3px 0; transform: rotate(45deg);
    }

    .reps-input {
      width: 72px; padding: 8px 10px; border-radius: 8px;
      border: 1px solid var(--border-color); background: var(--input-bg);
      color: var(--primary-color); text-align: center; font-size: .95em; font-weight: 900;
    }

    .peso-container { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .peso-label { font-size: .9em; color: var(--nav-item-color); }
    .peso-input {
      width: 70px; padding: 8px; border-radius: 8px; border: 1px solid var(--border-color);
      background: var(--input-bg); color: var(--text-color); text-align: center; font-size: 16px;
      -moz-appearance: textfield;
    }
    .peso-input::-webkit-outer-spin-button,
    .peso-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    /* TIMER */
    .exercicio-timer {
      margin: 14px auto 0;
      width: 130px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .exercicio-timer.active { display: flex; }

    .timer-ring-wrap {
      position: relative;
      width: 110px; height: 110px;
      display: flex; align-items: center; justify-content: center;
    }
    .timer-controls {
      display: flex; gap: 8px;
    }
    .timer-adjust-btn {
      background: var(--serie-bg);
      color: var(--primary-color);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.82em; font-weight: 700;
      cursor: pointer; touch-action: manipulation;
      min-width: 52px; text-align: center;
    }
    .timer-adjust-btn:active { transform: scale(0.93); opacity: 0.8; }
    .timer-svg { position: absolute; inset: 0; width: 100%; height: 100%; transform: rotate(-90deg); }
    .timer-circle-bg { stroke: var(--timer-bg); stroke-width: 7; fill: transparent; }
    .timer-circle-progress {
      stroke: var(--timer-color); stroke-width: 7; fill: transparent; stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke .3s ease-in-out;
    }
    .timer-text {
      position: relative; z-index: 1;
      font-size: 1.35em; font-weight: 900; letter-spacing: 1px;
      color: var(--timer-color);
      font-family: 'SF Mono', 'Courier New', monospace;
      transition: color .3s ease-in-out;
    }
    .exercicio-timer.warning .timer-circle-progress { stroke: var(--warning-color); }
    .exercicio-timer.warning .timer-text { color: var(--warning-color); }
    .exercicio-timer.finished .timer-circle-progress { stroke: var(--success-color); }
    .exercicio-timer.finished .timer-text { color: var(--success-color); }

    /* MODAL VÍDEO */
    .video-modal {
      display: none; position: fixed; inset: 0; z-index: 1500;
      background: rgba(0,0,0,.8); align-items: center; justify-content: center;
    }
    .video-modal-content {
      width: 90%; max-width: 800px; background: var(--container-bg); border-radius: 10px;
      padding: 20px; position: relative; box-shadow: 0 6px 20px rgba(0,0,0,.35);
    }
    .close-button {
      position: absolute; right: 20px; top: 10px; font-size: 28px; font-weight: 900;
      cursor: pointer; color: var(--text-color); user-select: none;
    }
    .video-responsive {
      position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden;
      background: #000; border-radius: 10px;
    }
    .video-responsive iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

    /* TOAST */
    .toast-container {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 1600; display: flex; flex-direction: column; gap: 10px; max-width: 90%;
    }
    .toast {
      background: #333; color: #fff; padding: 10px 20px; border-radius: 8px;
      text-align: center; box-shadow: 0 2px 10px rgba(0,0,0,.2);
      opacity: 0; transition: opacity .25s ease-in-out;
    }
    .toast.show { opacity: 1; }
    .toast.error   { background: var(--timer-color); }
    .toast.info    { background: var(--primary-color); }
    .toast.success { background: var(--success-color); }
    .toast.warning { background: var(--warning-color); color: #111; }

    /* MODAL CONFIRMAÇÃO (substitui window.confirm no iOS) */
    .confirm-modal {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,.65); z-index: 1700; padding: 16px;
    }
    .confirm-modal.show { display: flex; }
    .confirm-box {
      width: min(420px, 100%); background: var(--container-bg);
      border: 1px solid var(--border-color); border-radius: 12px; padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    .confirm-text { color: var(--text-color); font-weight: 900; font-size: 1rem; line-height: 1.3; margin-bottom: 14px; }
    .confirm-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .confirm-btn { border: 0; border-radius: 10px; padding: 10px 14px; font-weight: 900; cursor: pointer; touch-action: manipulation; }
    .confirm-btn.cancel { background: var(--serie-bg); color: var(--text-color); border: 1px solid var(--border-color); }
    .confirm-btn.ok { background: var(--btn-bg); color: var(--btn-text); }

    /* === MELHORIAS iOS === */

    /* Série marcada como concluída */
    .serie-item.done {
      border-color: var(--success-color) !important;
      background: rgba(0, 230, 118, 0.07) !important;
      transition: background 0.3s, border-color 0.3s;
    }
    .serie-item.done .reps-badge {
      background: rgba(0, 230, 118, 0.15);
      color: var(--success-color);
    }

    /* Exercício totalmente concluído */
    .exercicio.all-done {
      border-color: rgba(0, 230, 118, 0.4) !important;
      box-shadow: 0 0 0 1px rgba(0, 230, 118, 0.2), 0 2px 8px rgba(0,0,0,.12) !important;
    }

    /* Tab do dia atual */
    .tab-button.hoje {
      position: relative;
    }
    .tab-button.hoje::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 6px;
      height: 6px;
      background: var(--secondary-color);
      border-radius: 50%;
    }
    .tab-button.hoje:not(.active) {
      color: var(--secondary-color);
    }

    /* Swipe visual hint */
    .swipe-hint {
      text-align: center; font-size: 0.7em; color: var(--nav-item-color);
      padding: 4px 0 0; opacity: 0.6; letter-spacing: 0.5px;
    }

    /* Botão de vídeo maior no mobile */
    @media (max-width: 600px) {
      .video-button {
        width: 42px !important;
        height: 42px !important;
        font-size: 1.25em !important;
      }
    }

    /* Scroll suave ao focar exercício */
    .exercicio { scroll-margin-top: 180px; }

    /* Floating timer global */
    .floating-timer-global {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom) + 20px);
      left: 50%; transform: translateX(-50%);
      z-index: 1000;
      background: var(--glass-bg);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border-color);
      border-radius: 22px;
      padding: 14px 28px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      box-shadow: 0 6px 28px rgba(0,0,0,.5);
      min-width: 190px;
    }
    .floating-timer-global.active { display: flex; }
    .floating-timer-global.warning .timer-circle-progress { stroke: var(--warning-color); }
    .floating-timer-global.warning .timer-text { color: var(--warning-color); }
    .floating-timer-global.finished .timer-circle-progress { stroke: var(--success-color); }
    .floating-timer-global.finished .timer-text { color: var(--success-color); }
    .floating-timer-label {
      font-size: 0.62em; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--nav-item-color);
    }

    /* PR badge */
    .pr-badge {
      font-size: 0.68em; color: var(--warning-color); margin-left: 4px;
      display: none; vertical-align: middle;
    }
    .pr-badge.visible { display: inline; }

    /* Modal Histórico */
    .history-modal {
      display: none; position: fixed; inset: 0; z-index: 1500;
      background: rgba(0,0,0,.8); align-items: center; justify-content: center;
    }
    .history-modal.show { display: flex; }
    .history-modal-content {
      width: 90%; max-width: 480px; background: var(--container-bg); border-radius: 12px;
      padding: 20px; position: relative; box-shadow: 0 6px 20px rgba(0,0,0,.35);
      max-height: 80vh; overflow-y: auto;
    }
    .history-title { color: var(--primary-color); font-weight: 900; font-size: 1.1em; margin-bottom: 14px; }
    .history-item {
      background: var(--card-bg); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px;
      border: 1px solid var(--border-color);
    }
    .history-item-day { font-weight: 800; color: var(--primary-color); font-size: 0.95em; }
    .history-item-meta { font-size: 0.82em; color: var(--nav-item-color); margin-top: 4px; }
    .history-empty { color: var(--nav-item-color); text-align: center; padding: 20px; font-size: 0.9em; }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-top">
        <h1>Treinos Leonardo Gutierres</h1>
        <div class="header-actions">
          <a href="remedios.html" class="nav-link-button" title="Remédios">💊</a>
          <a href="dieta.html" class="nav-link-button" title="Dieta">🍽️</a>
          <button class="reset-button" id="historico-button" title="Histórico">📊</button>
          <button class="reset-button" id="reset-day-workout-button" title="Zerar Treino do Dia">🔄</button>
          <button class="theme-toggle-button" id="theme-toggle-button" title="Alternar Tema">
            <span id="theme-icon">☀️</span>
          </button>
        </div>
      </div>
      <div class="dashboard">
        <!-- Timer card: coluna esquerda, 2 linhas -->
        <div class="timer-card">
          <span class="timer-card-label">⏱ treino</span>
          <div class="workout-timer-header" id="workout-session-timer">00:00:00</div>
          <div class="timer-card-rest">
            <span class="timer-card-rest-label">descanso</span>
            <input type="number" id="timer-config-input" class="timer-config-input" value="90" min="10" max="600" inputmode="numeric" />
            <span class="timer-card-rest-unit">seg</span>
          </div>
        </div>
        <!-- Stats: coluna direita, grade 2x2 -->
        <div class="stats-container">
          <div class="stat-card">
            <span id="total-exercicios-concluidos" class="stat-value">0/0</span>
            <span class="stat-label">Exs.</span>
          </div>
          <div class="stat-card">
            <span id="total-series-concluidas" class="stat-value">0/0</span>
            <span class="stat-label">Séries</span>
          </div>
          <div class="stat-card">
            <span id="total-carga-volume" class="stat-value">0kg</span>
            <span class="stat-label">Volume</span>
          </div>
          <div class="stat-card">
            <span id="progresso-geral" class="stat-value">0%</span>
            <span class="stat-label">Prog.</span>
          </div>
        </div>
      </div>
      <div class="tabs" id="tabs"></div>
      <div class="swipe-hint">← deslize para mudar dia →</div>
    </header>
    <div id="tab-contents"></div>
  </div>

  <!-- Modal de Vídeo -->
  <div id="videoModal" class="video-modal" aria-hidden="true">
    <div class="video-modal-content">
      <span id="closeVideoModal" class="close-button">&times;</span>
      <div class="video-responsive">
        <iframe id="youtube-iframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
      </div>
    </div>
  </div>

  <!-- Modal de Confirmação (iOS-safe) -->
  <div id="confirmModal" class="confirm-modal" aria-hidden="true">
    <div class="confirm-box">
      <div id="confirmText" class="confirm-text">Tem certeza?</div>
      <div class="confirm-actions">
        <button id="confirmCancel" class="confirm-btn cancel" type="button">Cancelar</button>
        <button id="confirmOk" class="confirm-btn ok" type="button">Zerar</button>
      </div>
    </div>
  </div>

  <!-- Floating Timer Global -->
  <div id="floating-timer" class="floating-timer-global" aria-live="polite">
    <span class="floating-timer-label">⏱ descanso</span>
    <div class="timer-ring-wrap">
      <svg class="timer-svg" viewBox="0 0 80 80">
        <circle class="timer-circle-bg" cx="40" cy="40" r="35"></circle>
        <circle class="timer-circle-progress" cx="40" cy="40" r="35"
          stroke-dasharray="219.9" stroke-dashoffset="219.9"></circle>
      </svg>
      <span class="timer-text"></span>
    </div>
    <div class="timer-controls">
      <button class="timer-adjust-btn" onclick="window.adjustCurrentTimer(-10)">-10s</button>
      <button class="timer-adjust-btn" onclick="window.adjustCurrentTimer(10)">+10s</button>
    </div>
  </div>

  <!-- Modal Histórico -->
  <div id="historicoModal" class="history-modal" aria-hidden="true">
    <div class="history-modal-content">
      <span id="closeHistoricoModal" class="close-button">&times;</span>
      <div class="history-title">📊 Histórico de Treinos</div>
      <div id="historico-lista"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-container" class="toast-container"></div>

  <script>
    /* Polyfill simples para CSS.escape (evita erro em iOS antigo) */
    if (!window.CSS) window.CSS = {};
    if (!window.CSS.escape) {
      window.CSS.escape = function (value) {
        return String(value).replace(/[^a-zA-Z0-9_\u00A0-\uFFFF-]/g, "\\$&");
      };
    }

    const DEFAULT_TIMER_DURATION = 90;
    function getTimerDuration() {
      const input = document.getElementById('timer-config-input');
      const val = input ? parseInt(input.value) : DEFAULT_TIMER_DURATION;
      return (isNaN(val) || val < 10) ? DEFAULT_TIMER_DURATION : val;
    }
    const radius = 35;
    const circumference = 2 * Math.PI * radius;
    let loadedWorkouts = {};
    const activeTimers = {};
    let sessionStartTime = null;
    let currentTimerId = null;
    let sessionTimerInterval = null;
    let audioCtx = null;

    function ensureAudio() {
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) audioCtx = new AC();
      }
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
    }

    window.tocarBeep = function (freq = 880, duration = 120, volume = 0.05) {
      ensureAudio();
      if (!audioCtx) return;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.value = freq;
      g.gain.setValueAtTime(volume, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration / 1000);
      o.connect(g);
      g.connect(audioCtx.destination);
      o.start();
      setTimeout(() => { try { o.stop(); } catch (e) {} }, duration);
    };

    window.vibrar = function (pattern = 200) {
      if ('vibrate' in navigator) navigator.vibrate(pattern);
    };

    window.showToast = function (message, type = 'info', duration = 2500) {
      const toastContainer = document.getElementById('toast-container');
      if (!toastContainer) return;
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      toastContainer.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 10);
      setTimeout(() => {
        toast.classList.remove('show');
        toast.addEventListener('transitionend', () => toast.remove(), { once: true });
      }, duration);
    };

    window.openVideo = function (videoId) {
      const videoModal = document.getElementById('videoModal');
      const youtubeIframe = document.getElementById('youtube-iframe');
      if (!videoModal || !youtubeIframe) return;
      if (!videoId) return;
      youtubeIframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
      videoModal.style.display = 'flex';
      videoModal.setAttribute('aria-hidden', 'false');
    };

    window.closeModal = function () {
      const videoModal = document.getElementById('videoModal');
      const youtubeIframe = document.getElementById('youtube-iframe');
      if (!videoModal || !youtubeIframe) return;
      youtubeIframe.src = '';
      videoModal.style.display = 'none';
      videoModal.setAttribute('aria-hidden', 'true');
    };

    // Confirmação via modal (não usa window.confirm)
    window.confirmModal = function (message) {
      return new Promise((resolve) => {
        const modal  = document.getElementById('confirmModal');
        const text   = document.getElementById('confirmText');
        const ok     = document.getElementById('confirmOk');
        const cancel = document.getElementById('confirmCancel');
        if (!modal || !text || !ok || !cancel) { resolve(false); return; }
        text.textContent = message;
        modal.classList.add('show');
        modal.setAttribute('aria-hidden', 'false');
        const cleanup = (result) => {
          modal.classList.remove('show');
          modal.setAttribute('aria-hidden', 'true');
          ok.removeEventListener('click', onOk);
          cancel.removeEventListener('click', onCancel);
          modal.removeEventListener('click', onBackdrop);
          resolve(result);
        };
        const onOk      = () => cleanup(true);
        const onCancel  = () => cleanup(false);
        const onBackdrop = (e) => { if (e.target === modal) cleanup(false); };
        ok.addEventListener('click', onOk);
        cancel.addEventListener('click', onCancel);
        modal.addEventListener('click', onBackdrop);
      });
    };

    window.saveWeight = function (dayId, exIndex, serieIndex, weight) {
      localStorage.setItem(`weight-${dayId}-${exIndex}-${serieIndex}`, String(weight ?? ''));
      const newW = parseFloat(weight) || 0;
      if (newW > 0) {
        const prKey = `pr-max-${dayId}-${exIndex}`;
        const current = parseFloat(localStorage.getItem(prKey)) || 0;
        if (newW > current) {
          localStorage.setItem(prKey, String(newW));
          window.showToast(`🏆 Novo recorde! ${newW}kg`, 'warning', 2500);
        }
      }
    };

    window.loadWeight = function (dayId, exIndex, serieIndex) {
      return localStorage.getItem(`weight-${dayId}-${exIndex}-${serieIndex}`) || '';
    };

    window.saveRep = function (dayId, exIndex, serieIndex, value) {
      localStorage.setItem(`rep-${dayId}-${exIndex}-${serieIndex}`, String(value ?? ''));
    };

    window.loadRep = function (dayId, exIndex, serieIndex, fallback = '') {
      const saved = localStorage.getItem(`rep-${dayId}-${exIndex}-${serieIndex}`);
      return saved !== null ? saved : fallback;
    };

    // Timer usa floating global — não altera DOM do exercício
    window.startTimer = function (timerElementId, duration) {
      if (duration === undefined) duration = getTimerDuration();
      for (const id in activeTimers) {
        if (id !== timerElementId) window.stopTimer(id);
      }
      window.stopTimer(timerElementId);

      const el = document.getElementById('floating-timer');
      if (!el) return;
      const textEl = el.querySelector('.timer-text');
      const prog   = el.querySelector('.timer-circle-progress');
      if (!textEl || !prog) return;

      currentTimerId = timerElementId;
      el.classList.add('active');
      el.classList.remove('warning', 'finished');
      prog.style.strokeDasharray = String(circumference);

      const endTime = Date.now() + duration * 1000;
      localStorage.setItem('active-timer-id',  timerElementId);
      localStorage.setItem('active-timer-end', endTime);
      localStorage.setItem('active-timer-dur', duration);

      const render = () => {
        const remaining = Math.max(0, Math.round((endTime - Date.now()) / 1000));
        el.dataset.remaining = remaining;
        const m = Math.floor(remaining / 60);
        const s = remaining % 60;
        textEl.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        const ratio = remaining / duration;
        prog.style.strokeDashoffset = String(circumference * (1 - ratio));
        return remaining;
      };

      const onFinish = () => {
        clearInterval(activeTimers[timerElementId]?.intervalId);
        delete activeTimers[timerElementId];
        currentTimerId = null;
        localStorage.removeItem('active-timer-id');
        localStorage.removeItem('active-timer-end');
        localStorage.removeItem('active-timer-dur');
        textEl.textContent = '00:00';
        el.classList.remove('warning');
        el.classList.add('finished');
        prog.style.strokeDashoffset = '0';
        window.tocarBeep(880, 150, 0.1);
        setTimeout(() => window.tocarBeep(1100, 200, 0.1), 200);
        window.vibrar([200, 100, 200]);
        window.showToast('✅ Descanse acabou! Próxima série!', 'success', 3000);
        setTimeout(() => {
          if (!activeTimers[timerElementId]) el.classList.remove('active', 'finished');
        }, 5000);
      };

      render();

      const intervalId = setInterval(() => {
        const remaining = render();
        if (remaining <= 3 && remaining > 0) {
          el.classList.add('warning');
          window.tocarBeep(440, 100, 0.03);
        } else if (remaining <= 0) {
          onFinish();
        }
      }, 500);

      activeTimers[timerElementId] = { intervalId, endTime, duration, onFinish };
    };

    window.adjustCurrentTimer = function (delta) {
      if (currentTimerId) window.adjustTimer(currentTimerId, delta);
    };

    window.adjustTimer = function (timerElementId, delta) {
      const entry = activeTimers[timerElementId];
      const el = document.getElementById('floating-timer');
      if (!entry || !el) return;
      entry.endTime = Math.max(Date.now() + 1000, entry.endTime + delta * 1000);
      localStorage.setItem('active-timer-end', entry.endTime);
      const remaining = Math.max(0, Math.round((entry.endTime - Date.now()) / 1000));
      el.dataset.remaining = remaining;
      const textEl = el.querySelector('.timer-text');
      if (textEl) {
        const m = Math.floor(remaining / 60);
        const s = remaining % 60;
        textEl.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      }
    };

    window.stopTimer = function (timerElementId) {
      const entry = activeTimers[timerElementId];
      if (entry) {
        clearInterval(entry.intervalId);
        delete activeTimers[timerElementId];
      }
      if (currentTimerId === timerElementId) currentTimerId = null;
      localStorage.removeItem('active-timer-id');
      localStorage.removeItem('active-timer-end');
      localStorage.removeItem('active-timer-dur');
      const el = document.getElementById('floating-timer');
      if (!el) return;
      el.classList.remove('active', 'warning', 'finished');
      const textEl = el.querySelector('.timer-text');
      const prog   = el.querySelector('.timer-circle-progress');
      if (textEl) textEl.textContent = '';
      if (prog)   prog.style.strokeDashoffset = String(circumference);
    };

    // Quando o app volta ao foco (tela desbloqueada / volta do Safari)
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState !== 'visible') return;

      // Verifica se havia um timer ativo salvo
      const savedId  = localStorage.getItem('active-timer-id');
      const savedEnd = parseInt(localStorage.getItem('active-timer-end') || '0');
      const savedDur = parseInt(localStorage.getItem('active-timer-dur') || '0');
      if (!savedId || !savedEnd) return;

      const remaining = Math.round((savedEnd - Date.now()) / 1000);

      if (remaining <= 0) {
        // Timer expirou enquanto estava com tela bloqueada
        localStorage.removeItem('active-timer-id');
        localStorage.removeItem('active-timer-end');
        localStorage.removeItem('active-timer-dur');

        // Para o interval se ainda existir
        const entry = activeTimers[savedId];
        if (entry) {
          clearInterval(entry.intervalId);
          delete activeTimers[savedId];
        }

        // Atualiza visual no floating timer
        const el = document.getElementById('floating-timer');
        if (el) {
          const textEl = el.querySelector('.timer-text');
          const prog   = el.querySelector('.timer-circle-progress');
          if (textEl) textEl.textContent = '00:00';
          if (prog)   prog.style.strokeDashoffset = '0';
          el.classList.remove('warning');
          el.classList.add('active', 'finished');
          setTimeout(() => { el.classList.remove('active', 'finished'); }, 5000);
        }

        // Alerta ao voltar
        window.tocarBeep(880, 150, 0.1);
        setTimeout(() => window.tocarBeep(1100, 200, 0.1), 200);
        window.vibrar([200, 100, 200]);
        const overBy = Math.abs(remaining);
        const msg = overBy > 5
          ? `⏰ Descanso acabou há ${overBy}s! Hora da próxima série!`
          : '✅ Descanso acabou! Próxima série!';
        window.showToast(msg, 'success', 4000);
      } else {
        // Timer ainda rodando — reconecta o interval se perdeu
        const entry = activeTimers[savedId];
        if (!entry) {
          // Reconecta sem reiniciar (passa endTime existente)
          window.startTimer(savedId, savedDur);
          // Corrige o endTime para o salvo
          if (activeTimers[savedId]) activeTimers[savedId].endTime = savedEnd;
        }
      }
    });

    window.toggleExerciseTimer = function (checkbox, dayId, exIndex, serieIndex) {
      const timerElementId = `timer-${dayId}-${exIndex}-${serieIndex}`;
      if (checkbox.checked) window.startTimer(timerElementId);
      else                  window.stopTimer(timerElementId);
    };

    window.toggleExerciseCheckbox = function (checkbox, dayId, exIndex, serieIndex) {
      localStorage.setItem(`checkbox-${dayId}-${exIndex}-${serieIndex}`, checkbox.checked ? 'true' : 'false');
      window.toggleExerciseTimer(checkbox, dayId, exIndex, serieIndex);
      if (checkbox.checked) {
        window.vibrar(50);
        window.startSessionTimer();
      }
      // Visual: marcar série como done
      const serieItem = checkbox.closest('.serie-item');
      if (serieItem) {
        if (checkbox.checked) serieItem.classList.add('done');
        else serieItem.classList.remove('done');
      }
      // Auto-scroll para próximo exercício se este ficou completo
      window.atualizarContador();
      window.verificarExercicioConcluido(dayId, exIndex);
    };

    window.startSessionTimer = function () {
      if (sessionStartTime) return;
      sessionStartTime = Date.now();
      localStorage.setItem('session-start-time', sessionStartTime);
      if (sessionTimerInterval) clearInterval(sessionTimerInterval);
      sessionTimerInterval = setInterval(window.updateSessionTimerDisplay, 1000);
    };

    window.updateSessionTimerDisplay = function () {
      if (!sessionStartTime) return;
      const now  = Date.now();
      const diff = Math.floor((now - sessionStartTime) / 1000);
      const h = Math.floor(diff / 3600);
      const m = Math.floor((diff % 3600) / 60);
      const s = diff % 60;
      const display = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
      const el = document.getElementById('workout-session-timer');
      if (el) el.textContent = display;
    };

    window.verificarExercicioConcluido = function (dayId, exIndex) {
      const exercicioElement = document.querySelector(
        `#tab-content-${CSS.escape(dayId)} .exercicio:nth-child(${exIndex + 1})`
      );
      if (!exercicioElement) return;
      const checkboxes = exercicioElement.querySelectorAll('.serie-item input[type="checkbox"]');
      const total = checkboxes.length;
      if (total === 0) return;
      let done = 0;
      checkboxes.forEach(cb => { if (cb.checked) done++; });

      if (done === total) {
        exercicioElement.classList.add('all-done');
        // Scroll para o próximo exercício
        const allExercicios = document.querySelectorAll(`#tab-content-${CSS.escape(dayId)} .exercicio`);
        const nextEx = allExercicios[exIndex + 1];
        if (nextEx) {
          setTimeout(() => {
            nextEx.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 600);
        }
      } else {
        exercicioElement.classList.remove('all-done');
      }
    };

    window.atualizarProgressoExercicio = function (dayId, exIndex) {
      const exercicioElement = document.querySelector(
        `#tab-content-${CSS.escape(dayId)} .exercicio:nth-child(${exIndex + 1})`
      );
      if (!exercicioElement) return;
      const checkboxes = exercicioElement.querySelectorAll('.serie-item input[type="checkbox"]');
      const total = checkboxes.length;
      let done = 0;
      checkboxes.forEach(cb => { if (cb.checked) done++; });
      const progressoDiv = exercicioElement.querySelector('.progresso-exercicio');
      if (!progressoDiv) return;
      progressoDiv.textContent = `${done}/${total} séries concluídas`;
      if (total > 0 && done === total) progressoDiv.classList.add('concluido');
      else                             progressoDiv.classList.remove('concluido');
    };

    window.atualizarContador = function () {
      const activeTabButton = document.querySelector('.tab-button.active');
      const exSpan = document.getElementById('total-exercicios-concluidos');
      const seSpan = document.getElementById('total-series-concluidas');
      const prSpan = document.getElementById('progresso-geral');

      if (!activeTabButton) {
        if (exSpan) exSpan.textContent = '0/0';
        if (seSpan) seSpan.textContent = '0/0';
        if (prSpan) prSpan.textContent = '0%';
        return;
      }

      const dayId    = activeTabButton.dataset.day;
      const exercises = loadedWorkouts[dayId];
      if (!exercises) return;

      let totalExercicios = exercises.length;
      let exerciciosConcluidos = 0;
      let totalSeries = 0;
      let seriesConcluidas = 0;
      let volumeTotal = 0;

      exercises.forEach((ex, exIndex) => {
        const checkboxes = document.querySelectorAll(
          `#tab-content-${CSS.escape(dayId)} .exercicio:nth-child(${exIndex + 1}) .serie-item input[type="checkbox"]`
        );
        const totalSeriesEx = checkboxes.length;
        let doneEx = 0;
        checkboxes.forEach((cb, sIdx) => {
          if (cb.checked) {
            doneEx++;
            const weight   = parseFloat(window.loadWeight(dayId, exIndex, sIdx)) || 0;
            const repsStr  = window.loadRep(dayId, exIndex, sIdx, (ex.reps && ex.reps[sIdx]) ? String(ex.reps[sIdx]) : "");
            const repsMatch = String(repsStr).match(/\d+/);
            const reps     = repsMatch ? parseInt(repsMatch[0], 10) : 0;
            volumeTotal += (weight * reps);
          }
        });
        totalSeries    += totalSeriesEx;
        seriesConcluidas += doneEx;
        if (totalSeriesEx > 0 && doneEx === totalSeriesEx) exerciciosConcluidos++;
        window.atualizarProgressoExercicio(dayId, exIndex);
      });

      if (exSpan) exSpan.textContent = `${exerciciosConcluidos}/${totalExercicios}`;
      if (seSpan) seSpan.textContent = `${seriesConcluidas}/${totalSeries}`;

      const volSpan = document.getElementById('total-carga-volume');
      if (volSpan) volSpan.textContent = `${Math.round(volumeTotal)}kg`;

      if (prSpan) {
        const percentual = totalSeries > 0 ? Math.round((seriesConcluidas / totalSeries) * 100) : 0;
        prSpan.textContent = `${percentual}%`;

        // Treino 100% concluído → celebra, para o timer e zera após delay
        if (percentual === 100 && totalSeries > 0 && sessionStartTime) {
          window.finalizarTreino(dayId);
        }
      }
    };

    window.salvarHistorico = function (dayId, duracao, volume) {
      const historico = JSON.parse(localStorage.getItem('historico') || '[]');
      historico.unshift({ data: new Date().toLocaleDateString('pt-BR'), dia: dayId, duracao, volume });
      if (historico.length > 50) historico.length = 50;
      localStorage.setItem('historico', JSON.stringify(historico));
    };

    window.finalizarTreino = function (dayId) {
      if (sessionTimerInterval) clearInterval(sessionTimerInterval);

      const diff = Math.floor((Date.now() - sessionStartTime) / 1000);
      const h = Math.floor(diff / 3600);
      const m = Math.floor((diff % 3600) / 60);
      const s = diff % 60;
      const duracao = h > 0
        ? `${h}h ${String(m).padStart(2,'0')}min`
        : `${m}min ${String(s).padStart(2,'0')}s`;

      // Calcular volume total antes de salvar histórico
      const exercises = loadedWorkouts[dayId] || [];
      let volumeTotal = 0;
      exercises.forEach((ex, exIndex) => {
        (ex.reps || []).forEach((rep, sIdx) => {
          const weight = parseFloat(window.loadWeight(dayId, exIndex, sIdx)) || 0;
          const repsStr = window.loadRep(dayId, exIndex, sIdx, rep ? String(rep) : '');
          const repsMatch = String(repsStr).match(/\d+/);
          const reps = repsMatch ? parseInt(repsMatch[0], 10) : 0;
          volumeTotal += weight * reps;
        });
      });

      window.salvarHistorico(dayId, duracao, Math.round(volumeTotal));

      sessionStartTime = null;
      localStorage.removeItem('session-start-time');

      window.vibrar([100, 50, 100, 50, 300]);
      window.tocarBeep(523, 150, 0.12);
      setTimeout(() => window.tocarBeep(659, 150, 0.12), 180);
      setTimeout(() => window.tocarBeep(784, 250, 0.15), 360);

      window.showToast(`🏆 Treino concluído em ${duracao}! Volume: ${Math.round(volumeTotal)}kg`, 'success', 5000);
      // Use 🔄 para zerar manualmente
    };

    window.abrirHistorico = function () {
      const modal = document.getElementById('historicoModal');
      const lista = document.getElementById('historico-lista');
      if (!modal || !lista) return;
      const historico = JSON.parse(localStorage.getItem('historico') || '[]');
      if (historico.length === 0) {
        lista.innerHTML = '<div class="history-empty">Nenhum treino registrado ainda.<br>Complete um treino para ver o histórico!</div>';
      } else {
        lista.innerHTML = historico.map(h => `
          <div class="history-item">
            <div class="history-item-day">${h.dia.replace('-FEIRA', '')}</div>
            <div class="history-item-meta">${h.data} · ${h.duracao} · ${h.volume}kg volume</div>
          </div>
        `).join('');
      }
      modal.classList.add('show');
      modal.setAttribute('aria-hidden', 'false');
    };

    window.fecharHistorico = function () {
      const modal = document.getElementById('historicoModal');
      if (modal) { modal.classList.remove('show'); modal.setAttribute('aria-hidden', 'true'); }
    };

    window.handleTabClick = function (dayId) {
      document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(ct  => ct.classList.remove('active'));
      const clickedButton = document.querySelector(`.tab-button[data-day="${dayId}"]`);
      const targetContent = document.getElementById(`tab-content-${dayId}`);
      if (clickedButton) clickedButton.classList.add('active');
      if (targetContent) targetContent.classList.add('active');
      for (const id in activeTimers) window.stopTimer(id);
      window.atualizarContador();
    };

    window.renderWorkouts = function (workouts) {
      loadedWorkouts = workouts || {};
      const tabsContainer        = document.getElementById('tabs');
      const tabContentsContainer = document.getElementById('tab-contents');
      if (!tabsContainer || !tabContentsContainer) return;
      tabsContainer.innerHTML        = '';
      tabContentsContainer.innerHTML = '';

      const preferredOrder = ["SEGUNDA-FEIRA", "TERÇA-FEIRA", "QUARTA-FEIRA", "QUINTA-FEIRA", "SEXTA-FEIRA", "SABADO", "DOMINGO"];
      const sortedDays = Object.keys(loadedWorkouts).sort(
        (a, b) => preferredOrder.indexOf(a.toUpperCase()) - preferredOrder.indexOf(b.toUpperCase())
      );

      let firstTabRendered = false;

      for (const day of sortedDays) {
        if (!preferredOrder.includes(day.toUpperCase())) continue;
        const exercises = loadedWorkouts[day];
        if (!exercises || exercises.length === 0) continue;

        const tabButton = document.createElement('button');
        tabButton.className    = 'tab-button';
        tabButton.dataset.day  = day;
        tabButton.textContent  = day.replace('-FEIRA', '');
        tabButton.addEventListener('click', () => window.handleTabClick(day));
        tabsContainer.appendChild(tabButton);

        const tabContent = document.createElement('div');
        tabContent.id        = `tab-content-${day}`;
        tabContent.className = 'tab-content';
        tabContentsContainer.appendChild(tabContent);

        exercises.forEach((exercicio, exIndex) => {
          const exercicioDiv = document.createElement('div');
          exercicioDiv.className = 'exercicio';

          const videoIconHtml = exercicio.video_id
            ? `<button class="video-button" type="button" onclick="window.openVideo('${String(exercicio.video_id).replace(/'/g, "\\'")}') " title="Ver Vídeo">▶</button>`
            : '';

          const observacaoHtml = exercicio.observacao
            ? `<div class="observacao">${exercicio.observacao}</div>`
            : '';

          const seriesHtml = (exercicio.reps || []).map((reps, serieIndex) => {
            const weight      = window.loadWeight(day, exIndex, serieIndex);
            const repValue    = window.loadRep(day, exIndex, serieIndex, reps);
            const checkboxKey = `checkbox-${day}-${exIndex}-${serieIndex}`;
            const isChecked   = localStorage.getItem(checkboxKey) === 'true';
            const checkedAttr = isChecked ? 'checked' : '';
            const doneClass   = isChecked ? ' done' : '';
            return `
              <div class="serie-item${doneClass}">
                <label class="checkbox-container">
                  <input type="checkbox" ${checkedAttr}
                    onchange="window.toggleExerciseCheckbox(this, '${day}', ${exIndex}, ${serieIndex})" />
                  <span class="checkmark"></span>
                </label>
                <input type="text" class="reps-input" value="${repValue}"
                  onchange="window.saveRep('${day}', ${exIndex}, ${serieIndex}, this.value)"
                  placeholder="reps" inputmode="numeric" />
                <div class="peso-container">
                  <span class="peso-label">Peso:</span>
                  <input type="number" class="peso-input" value="${weight}"
                    onchange="window.saveWeight('${day}', ${exIndex}, ${serieIndex}, this.value)"
                    placeholder="0" inputmode="decimal" />
                </div>
              </div>
            `;
          }).join('');

          exercicioDiv.innerHTML = `
            <div class="ex-nome">
              <span class="ex-nome-text">${exercicio.nome || 'Exercício'}</span>
              <div class="ex-actions">${videoIconHtml}</div>
            </div>
            ${observacaoHtml}
            <div class="progresso-exercicio"></div>
            <div class="serie">${seriesHtml}</div>
          `;
          tabContent.appendChild(exercicioDiv);
        });

        if (!firstTabRendered) {
          tabButton.classList.add('active');
          tabContent.classList.add('active');
          firstTabRendered = true;
        }
      }

      // Marcar dia atual na tab
      const diasSemana = ['DOMINGO','SEGUNDA-FEIRA','TERÇA-FEIRA','QUARTA-FEIRA','QUINTA-FEIRA','SEXTA-FEIRA','SABADO'];
      const hoje = diasSemana[new Date().getDay()];
      document.querySelectorAll('.tab-button').forEach(btn => {
        if (btn.dataset.day.toUpperCase() === hoje) btn.classList.add('hoje');
      });

      // Marcar exercícios que já estavam todos concluídos (ao recarregar)
      for (const day of sortedDays) {
        const exercises = loadedWorkouts[day];
        if (!exercises) continue;
        exercises.forEach((ex, exIndex) => {
          const exercicioElement = document.querySelector(
            `#tab-content-${CSS.escape(day)} .exercicio:nth-child(${exIndex + 1})`
          );
          if (!exercicioElement) return;
          const checkboxes = exercicioElement.querySelectorAll('.serie-item input[type="checkbox"]');
          const total = checkboxes.length;
          let done = 0;
          checkboxes.forEach(cb => { if (cb.checked) done++; });
          if (total > 0 && done === total) exercicioElement.classList.add('all-done');
        });
      }

      window.atualizarContador();
    };

    // Treinos embutidos diretamente (sem fetch, sem problema de encoding)
    const TREINOS_DATA = {"TERÇA-FEIRA": [{"nome": "Mobilidade quadril - Frog", "series": 3, "reps": ["", "", ""], "intervalo": "1 min", "video_id": "VWHQLFxGSRc", "observacao": "Mobilidade"}, {"nome": "Mobilidade quadril - 90/90", "series": 3, "reps": ["", "", ""], "intervalo": "1 min", "video_id": "fB1mjgyQdjg", "observacao": "Mobilidade"}, {"nome": "Extensor", "series": 4, "reps": ["", "", "", ""], "intervalo": "2 min", "video_id": "yvOL5kqT7LM", "observacao": "2s de pico de contracao"}, {"nome": "Agachamento livre", "series": 4, "reps": ["", "", "", ""], "intervalo": "2 min", "video_id": "-tpbcmoHRHs", "observacao": "Barra livre"}, {"nome": "Leg 45", "series": 4, "reps": ["", "", "", ""], "intervalo": "2 min", "video_id": "SbSPL5d_-vY", "observacao": ""}, {"nome": "Stiff", "series": 3, "reps": ["", "", ""], "intervalo": "2 min", "video_id": "mnVDYVJ_Wzs", "observacao": ""}, {"nome": "Flexor sentado", "series": 3, "reps": ["", "", ""], "intervalo": "2 min", "video_id": "Pu6Jp_KEDRw", "observacao": ""}, {"nome": "Panturrilha sentado", "series": 4, "reps": ["", "", "", ""], "intervalo": "1 min", "video_id": "1W0djgDRAPs", "observacao": ""}, {"nome": "Panturrilha em pe", "series": 3, "reps": ["", "", ""], "intervalo": "1 min", "video_id": "Kdg_CwM2TCk", "observacao": ""}], "QUARTA-FEIRA": [{"nome": "Supino inclinado", "series": 4, "reps": ["", "", "", ""], "intervalo": "1 min", "video_id": "FHtNZA_Edxo", "observacao": "Com halteres"}, {"nome": "Crucifixo inclinado", "series": 3, "reps": ["", "", ""], "intervalo": "1 min", "video_id": "MvHthPgz1Aw", "observacao": "Com halteres ou na maquina"}, {"nome": "Supino reto", "series": 4, "reps": ["", "", "", ""], "intervalo": "1 min", "video_id": "jcsReN0guBQ", "observacao": "Com barra"}, {"nome": "Crossover", "series": 3, "reps": ["", "", ""], "intervalo": "1 min", "video_id": "DA2RGSYfV7k", "observacao": "Na polia alta"}, {"nome": "Triceps testa", "series": 3, "reps": ["", "", ""], "intervalo": "1 min", "video_id": "WMj2GMmenwE", "observacao": "Com barra"}, {"nome": "Triceps corda", "series": 3, "reps": ["", "", ""], "intervalo": "1 min", "video_id": "5DUudo0SKFs", "observacao": ""}, {"nome": "Triceps coice", "series": 3, "reps": ["", "", ""], "intervalo": "1 min", "video_id": "X0G42t-47dg", "observacao": "Unilateral"}, {"nome": "Abdominal infra", "series": 4, "reps": ["", "", "", ""], "intervalo": "1 min", "video_id": "0ywvVXG1rXs", "observacao": ""}, {"nome": "Abdominal remador", "series": 4, "reps": ["", "", "", ""], "intervalo": "1 min", "video_id": "FBmz26nVdiM", "observacao": ""}], "QUINTA-FEIRA": [{"nome": "Puxada aberta", "series": 4, "reps": ["", "", "", ""], "intervalo": "1 min", "video_id": "0-bkt0nK4tY", "observacao": "Pegada neutra"}, {"nome": "Puxada fechada", "series": 4, "reps": ["", "", "", ""], "intervalo": "1 min", "video_id": "uBv1xp4xJuQ", "observacao": "Com barra triangulo"}, {"nome": "Remada curvada", "series": 4, "reps": ["", "", "", ""], "intervalo": "1 min", "video_id": "uEweasF0M8g", "observacao": "Pegada pronada, livre ou maquina"}, {"nome": "Serrote", "series": 3, "reps": ["", "", ""], "intervalo": "1 min", "video_id": "tu0mUdt0jxI", "observacao": ""}, {"nome": "Rosca direta", "series": 3, "reps": ["", "", ""], "intervalo": "1 min", "video_id": "cFxN-y9hJfI", "observacao": "Com barra"}, {"nome": "Rosca alternada", "series": 3, "reps": ["", "", ""], "intervalo": "1 min", "video_id": "8zBJqZrQbgI", "observacao": "Em pe"}, {"nome": "Rosca scott", "series": 3, "reps": ["", "", ""], "intervalo": "1 min", "video_id": "DM6Vzp6U2Ro", "observacao": ""}], "SABADO": [{"nome": "Desenvolvimento de ombros", "series": 4, "reps": ["", "", "", ""], "intervalo": "1 min", "video_id": "IEeX3eh9RZk", "observacao": "Na maquina"}, {"nome": "Elevacao frontal", "series": 3, "reps": ["", "", ""], "intervalo": "1 min", "video_id": "qSzXLqQf57o", "observacao": "Alternado"}, {"nome": "Elevacao lateral", "series": 4, "reps": ["", "", "", ""], "intervalo": "1 min", "video_id": "orRrixiL8fY", "observacao": "Sentado"}, {"nome": "Crucifixo inverso", "series": 4, "reps": ["", "", "", ""], "intervalo": "1 min", "video_id": "INO6TrNR5a8", "observacao": "Com halteres"}, {"nome": "Encolhimento de ombros", "series": 4, "reps": ["", "", "", ""], "intervalo": "1 min", "video_id": "E7Mo7NS12Gs", "observacao": "Com halteres"}, {"nome": "Abdominal infra", "series": 4, "reps": ["", "", "", ""], "intervalo": "1 min", "video_id": "0ywvVXG1rXs", "observacao": ""}, {"nome": "Abdominal remador", "series": 4, "reps": ["", "", "", ""], "intervalo": "1 min", "video_id": "FBmz26nVdiM", "observacao": ""}, {"nome": "Abdominal prancha", "series": 4, "reps": ["", "", "", ""], "intervalo": "1 min", "video_id": "-jIfgL11pRI", "observacao": ""}]};

    function loadWorkouts() {
      try {
        window.renderWorkouts(TREINOS_DATA);
        // Auto-navegar para o dia atual se existir
        const diasSemana = ['DOMINGO','SEGUNDA-FEIRA','TERÇA-FEIRA','QUARTA-FEIRA','QUINTA-FEIRA','SEXTA-FEIRA','SABADO'];
        const hoje = diasSemana[new Date().getDay()];
        const tabHoje = document.querySelector(`.tab-button[data-day="${hoje}"]`);
        if (tabHoje) window.handleTabClick(hoje);
      } catch (error) {
        console.error('Erro ao carregar treinos:', error);
        window.showToast('Erro ao carregar treinos', 'error', 3500);
      }
    }

    // Zerar treino do dia (NÃO apaga pesos)
    window.resetDayWorkout = async function () {
      const activeTabButton = document.querySelector('.tab-button.active');
      if (!activeTabButton) {
        window.showToast('Nenhum treino ativo para zerar.', 'warning');
        return;
      }
      const dayId    = activeTabButton.dataset.day;
      const exercises = loadedWorkouts[dayId];
      if (!exercises || exercises.length === 0) {
        window.showToast('Não há exercícios para zerar neste dia.', 'warning');
        return;
      }

      const ok = await window.confirmModal(`Tem certeza que deseja zerar o treino de ${dayId}?`);
      if (!ok) return;

      exercises.forEach((ex, exIndex) => {
        (ex.reps || []).forEach((_, serieIndex) => {
          const checkboxKey = `checkbox-${dayId}-${exIndex}-${serieIndex}`;
          localStorage.removeItem(checkboxKey);

          const checkbox = document.querySelector(
            `#tab-content-${CSS.escape(dayId)} .exercicio:nth-child(${exIndex + 1}) .serie-item:nth-child(${serieIndex + 1}) input[type="checkbox"]`
          );
          if (checkbox) checkbox.checked = false;

          window.stopTimer(`timer-${dayId}-${exIndex}-${serieIndex}`);
          // NÃO mexe no peso (weight-...)
        });
      });

      window.atualizarContador();

      const anyChecked = document.querySelector('input[type="checkbox"]:checked');
      if (!anyChecked) {
        sessionStartTime = null;
        localStorage.removeItem('session-start-time');
        if (sessionTimerInterval) clearInterval(sessionTimerInterval);
        const timerEl = document.getElementById('workout-session-timer');
        if (timerEl) timerEl.textContent = '00:00:00';
      }
      window.showToast(`Treino de ${dayId} zerado com sucesso!`, 'success');
    };

    // Tema
    window.toggleThemeMode = function () {
      const icon = document.getElementById('theme-icon');
      if (document.body.classList.contains('light-mode')) {
        document.body.classList.remove('light-mode');
        document.body.classList.add('dark-mode');
        localStorage.setItem('theme', 'dark');
        if (icon) icon.textContent = '☀️';
      } else {
        document.body.classList.add('light-mode');
        document.body.classList.remove('dark-mode');
        localStorage.setItem('theme', 'light');
        if (icon) icon.textContent = '🌙';
      }
    };

    // Bind do botão 🔄 (iOS-safe) + anti-duplo disparo
    function bindResetButtonIOSSafe() {
      const btn = document.getElementById('reset-day-workout-button');
      if (!btn) return;
      let lastFire = 0;
      const fireOnce = (e) => {
        ensureAudio();
        const now = Date.now();
        if (now - lastFire < 500) return;
        lastFire = now;
        if (e && typeof e.stopPropagation === 'function') e.stopPropagation();
        window.resetDayWorkout();
      };
      btn.onclick = null;
      btn.addEventListener('pointerup', fireOnce, { passive: true });
      btn.addEventListener('touchend',  fireOnce, { passive: true });
      btn.addEventListener('click',     fireOnce);
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.addEventListener('pointerdown', ensureAudio, { passive: true, once: true });
      document.addEventListener('touchstart',  ensureAudio, { passive: true, once: true });

      const videoModal = document.getElementById('videoModal');
      if (videoModal) {
        videoModal.addEventListener('click', (e) => { if (e.target === videoModal) window.closeModal(); });
      }
      const closeButton = document.getElementById('closeVideoModal');
      if (closeButton) closeButton.addEventListener('click', window.closeModal);

      const savedTheme = localStorage.getItem('theme');
      const icon       = document.getElementById('theme-icon');
      const themeBtn   = document.getElementById('theme-toggle-button');
      if (themeBtn) themeBtn.addEventListener('click', window.toggleThemeMode);

      if (savedTheme === 'light') {
        document.body.classList.add('light-mode');
        if (icon) icon.textContent = '🌙';
      } else {
        document.body.classList.add('dark-mode');
        if (icon) icon.textContent = '☀️';
      }

      bindResetButtonIOSSafe();

      const historicoBtn = document.getElementById('historico-button');
      if (historicoBtn) historicoBtn.addEventListener('click', window.abrirHistorico);
      const closeHistoricoBtn = document.getElementById('closeHistoricoModal');
      if (closeHistoricoBtn) closeHistoricoBtn.addEventListener('click', window.fecharHistorico);
      const historicoModal = document.getElementById('historicoModal');
      if (historicoModal) historicoModal.addEventListener('click', (e) => { if (e.target === historicoModal) window.fecharHistorico(); });

      // Restaurar config do timer
      const savedTimer = localStorage.getItem('timer-duration');
      const timerInput = document.getElementById('timer-config-input');
      if (savedTimer && timerInput) timerInput.value = savedTimer;
      if (timerInput) {
        timerInput.addEventListener('change', () => {
          localStorage.setItem('timer-duration', timerInput.value);
        });
      }

      // Swipe para mudar de dia
      let touchStartX = 0;
      let touchStartY = 0;
      const tabContentsEl = document.getElementById('tab-contents');
      if (tabContentsEl) {
        tabContentsEl.addEventListener('touchstart', (e) => {
          touchStartX = e.changedTouches[0].clientX;
          touchStartY = e.changedTouches[0].clientY;
        }, { passive: true });
        tabContentsEl.addEventListener('touchend', (e) => {
          const dx = e.changedTouches[0].clientX - touchStartX;
          const dy = e.changedTouches[0].clientY - touchStartY;
          if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) {
            const tabs = Array.from(document.querySelectorAll('.tab-button'));
            const activeIdx = tabs.findIndex(t => t.classList.contains('active'));
            if (dx < 0 && activeIdx < tabs.length - 1) window.handleTabClick(tabs[activeIdx + 1].dataset.day);
            else if (dx > 0 && activeIdx > 0) window.handleTabClick(tabs[activeIdx - 1].dataset.day);
          }
        }, { passive: true });
      }

      const savedStart = localStorage.getItem('session-start-time');
      if (savedStart) {
        sessionStartTime = parseInt(savedStart);
        sessionTimerInterval = setInterval(window.updateSessionTimerDisplay, 1000);
      }

      loadWorkouts();
    });

    // Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js').catch(() => {});
      });
    }
  </script>
